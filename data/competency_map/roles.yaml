# Профильные ИИ-роли КРМ для дисциплины «Методы Монте-Карло в машинном обучении»

roles:
  - code: MLE
    name: ML Engineer
    full_name: Инженер машинного обучения
    description: >
      Дисциплина требует практической реализации алгоритмов сэмплирования,
      MCMC, HMC, MCTS, что напрямую соответствует инженерии машинного обучения.
    competencies:
      - MF-2
      - MF-4
      - PL-1

  - code: DA
    name: Data Analyst
    full_name: Аналитик данных
    description: >
      Курс включает глубокий анализ данных, проверку статистических гипотез,
      визуализацию и интерпретацию результатов стохастического моделирования.
    competencies:
      - MF-1
      - MF-2
      - MF-4
      - PL-1

  - code: MLR
    name: ML Researcher
    full_name: Исследователь в области машинного обучения
    description: >
      Теоретические основы (ЗБЧ, ЦПТ, сходимость MCMC) и байесовский вывод
      требуют исследовательского подхода и математической строгости.
    competencies:
      - MF-1
      - MF-2
      - MF-4
      - PL-1
