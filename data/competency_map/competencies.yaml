# Компетенции и индикаторы КРМ, используемые в дисциплине

competencies:
  - code: MF-1
    name: Математические основы ИИ
    full_name: Способен применять современную теоретическую математику для разработки новых алгоритмов и формулирования перспективных задач ИИ
    indicators:
      - code: MF-1.1
        description: Обосновывает способы и варианты применения методов и моделей в задачах ИИ.
      - code: MF-1.2
        description: Применяет аппарат теории вероятностей и математической статистики для формулирования и анализа задач ИИ.

  - code: MF-2
    name: Байесовская статистика и моделирование
    full_name: Способен применять байесовский подход для построения вероятностных моделей, анализа неопределённости и создания адаптивных систем ИИ
    indicators:
      - code: MF-2.1
        description: Использует теорему Байеса и её следствия.
      - code: MF-2.2
        description: Применяет байесовские методы оценивания и байесовские интервалы.
      - code: MF-2.3
        description: Анализирует и применяет байесовский и частотный подходы.

  - code: MF-4
    name: Статистические основы МО
    full_name: Способен применять статистические методы для анализа данных, валидации моделей машинного обучения и проведения экспериментов в области ИИ
    indicators:
      - code: MF-4.1
        description: Применяет статистические методы для решения задач анализа данных и проведения экспериментов.
      - code: MF-4.2
        description: Применяет статистические методы для построения предсказательных моделей, включая временные ряды.
      - code: MF-4.3
        description: Оценивает качество моделей с использованием статистических критериев.

  - code: PL-1
    name: Python для ИИ
    full_name: Способен применять язык программирования Python для решения задач в области ИИ
    indicators:
      - code: PL-1.1
        description: Разрабатывает и отлаживает прикладные решения на Python.
      - code: PL-1.2
        description: Осуществляет выбор инструментов разработки на Python (NumPy, PyMC, PyTorch).
      - code: PL-1.3
        description: Разрабатывает и поддерживает системы обработки данных.
